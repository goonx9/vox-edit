<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VoxEdit AI</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string
      // and converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which will cause the browser to refresh the page without actually
      // reloading it.
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, l.pathname.lastIndexOf('/')) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="text/javascript">
      // If the page is not found, redirect to index.html with the current path as a query parameter
      window.location.replace(
        window.location.protocol + '//' + window.location.hostname + (window.location.port ? ':' + window.location.port : '') + 
        window.location.pathname.split('/').slice(0, -1).join('/') + '/index.html?/' + 
        window.location.pathname.split('/').slice(-1).join('/') + window.location.search + window.location.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
